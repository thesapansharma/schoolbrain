# SchoolBrain.ai — Nginx Configuration
# Copy to: /etc/nginx/sites-available/schoolbrain
# Enable:  ln -s /etc/nginx/sites-available/schoolbrain /etc/nginx/sites-enabled/
# SSL:     certbot --nginx -d yourdomain.com
# Reload:  nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name yourdomain.com;

    # Redirect all HTTP → HTTPS (certbot adds this automatically)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name yourdomain.com;

    # SSL certs managed by Let's Encrypt / certbot
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";

    # Larger body for PDF uploads
    client_max_body_size 50M;

    # FastAPI backend
    location /api/ {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;    # AI responses can take a moment
    }

    # Direct API access (no prefix)
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
